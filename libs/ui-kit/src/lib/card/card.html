<div class="card" [class.card--hover]="hoverable()">
  @if (title()) {
    <div class="card-header">
      <h3>{{ title() }}</h3>
      @if (subtitle()) {
        <p>{{ subtitle() }}</p>
      }
    </div>
  }
  <div class="card-body">
    <ng-content></ng-content>
  </div>
  @if (footer()) {
    <div class="card-footer">
      <ng-content select="[slot=footer]"></ng-content>
    </div>
  }
</div>

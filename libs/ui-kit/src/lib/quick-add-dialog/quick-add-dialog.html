@if (rendered()) {
  <div
    class="quick-add-dialog-backdrop"
    [class.quick-add-dialog-backdrop--closing]="closing()"
    role="button"
    tabindex="0"
    [attr.aria-label]="closeAriaLabel()"
    (click)="onBackdropClose($event)"
    (keydown.enter)="onBackdropClose($event)"
    (keydown.space)="onBackdropClose($event)"
  >
    <div
      class="quick-add-dialog-panel"
      [class.quick-add-dialog-panel--sm]="size() === 'sm'"
      [class.quick-add-dialog-panel--md]="size() === 'md'"
      [class.quick-add-dialog-panel--lg]="size() === 'lg'"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="title()"
      (click)="$event.stopPropagation()"
      (keydown.enter)="$event.stopPropagation()"
      (keydown.space)="$event.stopPropagation()"
    >
      <ng-content />
    </div>
  </div>
}

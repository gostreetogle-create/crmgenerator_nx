@if (label()) {
  <label
    [for]="inputId()"
    class="input-label"
    [class.input-label--error]="error()"
  >
    {{ label() }}
  </label>
}

<input
  [id]="inputId()"
  [type]="type()"
  [placeholder]="placeholder()"
  [value]="value()"
  [disabled]="disabled()"
  [class]="computedClasses()"
  (input)="onInput($event)"
  (change)="onInput($event)"
/>

@if (error() && showErrorText()) {
  <p class="error">{{ error() }}</p>
}

name: docs-links

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-links.yml"
  workflow_dispatch:

jobs:
  check-links:
    name: Check markdown links in docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate links under docs/
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,201,202,204,206,301,302,307,308,403,429
            "docs/**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
